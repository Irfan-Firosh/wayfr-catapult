<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" font-family="'SF Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <linearGradient id="gPhone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="gBackend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1e08"/>
      <stop offset="100%" stop-color="#1a1205"/>
    </linearGradient>
    <linearGradient id="gRealtime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1020"/>
      <stop offset="100%" stop-color="#110a15"/>
    </linearGradient>
    <linearGradient id="gLaptop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2820"/>
      <stop offset="100%" stop-color="#081a14"/>
    </linearGradient>
    <marker id="am" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F5A623" opacity="0.8"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60A5FA" opacity="0.7"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34D399" opacity="0.7"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A78BFA" opacity="0.7"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#F5A623" stroke-width="0.5">
    <line x1="0" y1="130" x2="1200" y2="130"/><line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="300" y1="0" x2="300" y2="520"/><line x1="600" y1="0" x2="600" y2="520"/>
    <line x1="900" y1="0" x2="900" y2="520"/>
  </g>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#F5A623" font-size="16" font-weight="700" letter-spacing="3" opacity="0.9">
    WAYFR · CROSS-DEVICE DEMO FLOW
  </text>
  <text x="600" y="62" text-anchor="middle" fill="#ffffff" font-size="10" opacity="0.4">
    Phone captures · Cloud relays · Laptop visualises · User hears
  </text>

  <!-- ─── COLUMN 1: Phone / Capture ──────────────────────────────────── -->
  <text x="150" y="96" text-anchor="middle" fill="#60A5FA" font-size="9" letter-spacing="2" opacity="0.6">CAPTURE DEVICE</text>

  <!-- Phone frame -->
  <rect x="60" y="108" width="180" height="290" rx="16" fill="url(#gPhone)" stroke="#60A5FA" stroke-width="1.2" opacity="0.9"/>
  <!-- Phone notch -->
  <rect x="115" y="112" width="70" height="8" rx="4" fill="#0f1a30" opacity="0.8"/>
  <!-- Screen area -->
  <rect x="72" y="128" width="156" height="220" rx="6" fill="#040811" opacity="0.9"/>
  <!-- Camera indicator -->
  <circle cx="100" cy="148" r="14" fill="#0a1520" stroke="#60A5FA" stroke-width="1" opacity="0.8"/>
  <circle cx="100" cy="148" r="7" fill="#1a2a4a" opacity="0.9"/>
  <circle cx="100" cy="148" r="3" fill="#60A5FA" opacity="0.6"/>
  <text x="122" y="144" fill="#ffffff" font-size="8" opacity="0.6">getUserMedia()</text>
  <text x="122" y="156" fill="#60A5FA" font-size="8" opacity="0.5">facingMode: env</text>
  <!-- Video stream rect -->
  <rect x="80" y="168" width="140" height="88" rx="4" fill="#0a1520" stroke="#60A5FA" stroke-width="0.5" opacity="0.7"/>
  <text x="150" y="206" text-anchor="middle" fill="#60A5FA" font-size="9" opacity="0.5">live camera feed</text>
  <text x="150" y="220" text-anchor="middle" fill="#F5A623" font-size="8" opacity="0.6">640×480 · 5 fps</text>
  <!-- Encode step -->
  <rect x="80" y="268" width="140" height="32" rx="5" fill="#1a2a4a" stroke="#F5A623" stroke-width="0.6" opacity="0.8"/>
  <text x="150" y="282" text-anchor="middle" fill="#F5A623" font-size="9" opacity="0.8">base64 encode</text>
  <text x="150" y="293" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.4">~18KB per frame</text>
  <!-- WSS step -->
  <rect x="80" y="310" width="140" height="24" rx="5" fill="#1a2a4a" stroke="#60A5FA" stroke-width="0.6" opacity="0.8"/>
  <text x="150" y="326" text-anchor="middle" fill="#60A5FA" font-size="9" opacity="0.8">WebSocket send</text>

  <!-- URL badge -->
  <rect x="72" y="345" width="156" height="18" rx="4" fill="#0a1520" opacity="0.8"/>
  <text x="150" y="357" text-anchor="middle" fill="#60A5FA" font-size="8" opacity="0.7">wayfr.app/capture?session=ABC123</text>

  <!-- Phone label -->
  <text x="150" y="415" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="700" letter-spacing="1" opacity="0.9">PHONE</text>
  <text x="150" y="430" text-anchor="middle" fill="#ffffff" font-size="9" opacity="0.4">any browser · any camera</text>

  <!-- ─── COLUMN 2: Backend ──────────────────────────────────────────── -->
  <text x="450" y="96" text-anchor="middle" fill="#F5A623" font-size="9" letter-spacing="2" opacity="0.6">AI BACKEND</text>

  <!-- FastAPI WSS -->
  <rect x="340" y="108" width="220" height="50" rx="10" fill="url(#gBackend)" stroke="#F5A623" stroke-width="1.2" opacity="0.9" filter="url(#glow)"/>
  <text x="450" y="129" text-anchor="middle" fill="#F5A623" font-size="11" font-weight="700" letter-spacing="1">FASTAPI WSS SERVER</text>
  <text x="450" y="146" text-anchor="middle" fill="#ffffff" font-size="9" opacity="0.5">wss://api.wayfr.app/ws/{session_id}</text>

  <!-- Depth -->
  <rect x="340" y="176" width="100" height="50" rx="8" fill="url(#gBackend)" stroke="#F5A623" stroke-width="0.8" opacity="0.85"/>
  <text x="390" y="196" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="700">DEPTH ANYTHING</text>
  <text x="390" y="210" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.4">v2 · ~120ms</text>
  <text x="390" y="221" text-anchor="middle" fill="#F5A623" font-size="8" opacity="0.5">depth map</text>

  <!-- Scene3D -->
  <rect x="460" y="176" width="100" height="50" rx="8" fill="url(#gBackend)" stroke="#F5A623" stroke-width="0.8" opacity="0.85"/>
  <text x="510" y="196" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="700">SCENE3D FUSION</text>
  <text x="510" y="210" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.4">10-frame window</text>
  <text x="510" y="221" text-anchor="middle" fill="#F5A623" font-size="8" opacity="0.5">0.05m voxels</text>

  <!-- Novel views -->
  <rect x="340" y="244" width="100" height="50" rx="8" fill="url(#gBackend)" stroke="#F5A623" stroke-width="0.8" opacity="0.85"/>
  <text x="390" y="264" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="700">NOVEL VIEWS</text>
  <text x="390" y="278" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.4">4 synthetic views</text>
  <text x="390" y="289" text-anchor="middle" fill="#F5A623" font-size="8" opacity="0.5">~80ms</text>

  <!-- RCAC VLM -->
  <rect x="460" y="244" width="100" height="50" rx="8" fill="url(#gBackend)" stroke="#F5A623" stroke-width="0.8" opacity="0.85"/>
  <text x="510" y="261" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="700">RCAC VLM</text>
  <text x="510" y="275" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.4">custom model</text>
  <text x="510" y="286" text-anchor="middle" fill="#F5A623" font-size="8" opacity="0.5">+ Gemini fallback</text>

  <!-- Narration -->
  <rect x="340" y="312" width="220" height="44" rx="8" fill="url(#gBackend)" stroke="#F5A623" stroke-width="0.8" opacity="0.85"/>
  <text x="450" y="330" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="700">CLAUDE HAIKU · ELEVENLABS</text>
  <text x="450" y="344" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.4">narration text → Rachel voice → Ray-Ban</text>

  <!-- Backend label -->
  <text x="450" y="415" text-anchor="middle" fill="#F5A623" font-size="11" font-weight="700" letter-spacing="1" opacity="0.9">AI PIPELINE</text>
  <text x="450" y="430" text-anchor="middle" fill="#ffffff" font-size="9" opacity="0.4">FastAPI · Python · GPU · &lt;1010ms total</text>

  <!-- ─── COLUMN 3: Supabase Realtime ──────────────────────────────────── -->
  <text x="750" y="96" text-anchor="middle" fill="#A78BFA" font-size="9" letter-spacing="2" opacity="0.6">CLOUD RELAY</text>

  <rect x="660" y="108" width="180" height="200" rx="12" fill="url(#gRealtime)" stroke="#A78BFA" stroke-width="1.2" opacity="0.9"/>
  <text x="750" y="132" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700" letter-spacing="1">SUPABASE</text>
  <text x="750" y="148" text-anchor="middle" fill="#ffffff" font-size="9" opacity="0.5">Realtime · Postgres</text>

  <!-- Table icon -->
  <rect x="695" y="162" width="110" height="64" rx="6" fill="#1c1020" stroke="#A78BFA" stroke-width="0.6" opacity="0.8"/>
  <text x="750" y="178" text-anchor="middle" fill="#A78BFA" font-size="8" opacity="0.7">sessions table</text>
  <text x="750" y="193" text-anchor="middle" fill="#ffffff" font-size="7.5" opacity="0.4">session_id  ·  frame_b64</text>
  <text x="750" y="206" text-anchor="middle" fill="#ffffff" font-size="7.5" opacity="0.4">detections  ·  narration</text>
  <text x="750" y="219" text-anchor="middle" fill="#A78BFA" font-size="7.5" opacity="0.5">updated_at  ·  metadata</text>

  <!-- Realtime channel -->
  <rect x="695" y="238" width="110" height="30" rx="5" fill="#251535" stroke="#A78BFA" stroke-width="0.6" opacity="0.8"/>
  <text x="750" y="252" text-anchor="middle" fill="#A78BFA" font-size="8" opacity="0.8">Realtime channel</text>
  <text x="750" y="263" text-anchor="middle" fill="#ffffff" font-size="7.5" opacity="0.4">session:{id}:frames</text>

  <!-- Realtime label -->
  <text x="750" y="415" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700" letter-spacing="1" opacity="0.9">SUPABASE</text>
  <text x="750" y="430" text-anchor="middle" fill="#ffffff" font-size="9" opacity="0.4">live push to all subscribers</text>

  <!-- ─── COLUMN 4: Laptop / Dashboard ──────────────────────────────────── -->
  <text x="1050" y="96" text-anchor="middle" fill="#34D399" font-size="9" letter-spacing="2" opacity="0.6">MONITOR DEVICE</text>

  <!-- Laptop frame -->
  <rect x="930" y="108" width="240" height="160" rx="8" fill="url(#gLaptop)" stroke="#34D399" stroke-width="1.2" opacity="0.9"/>
  <!-- Screen bezel -->
  <rect x="942" y="118" width="216" height="138" rx="4" fill="#040811" opacity="0.95"/>
  <!-- 3D viewer mockup -->
  <rect x="950" y="125" width="200" height="100" rx="3" fill="#060614" stroke="#F5A623" stroke-width="0.5" opacity="0.8"/>
  <!-- Grid lines on viewer -->
  <g opacity="0.15" stroke="#F5A623" stroke-width="0.4">
    <line x1="950" y1="145" x2="1150" y2="145"/>
    <line x1="950" y1="165" x2="1150" y2="165"/>
    <line x1="950" y1="185" x2="1150" y2="185"/>
    <line x1="990" y1="125" x2="990" y2="225"/>
    <line x1="1050" y1="125" x2="1050" y2="225"/>
    <line x1="1110" y1="125" x2="1110" y2="225"/>
  </g>
  <!-- 3D objects (wireframe boxes) -->
  <rect x="985" y="148" width="18" height="22" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.8"/>
  <rect x="1020" y="155" width="16" height="18" rx="2" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.7"/>
  <rect x="1065" y="152" width="14" height="16" rx="2" fill="none" stroke="#34D399" stroke-width="1" opacity="0.6"/>
  <!-- Label pill -->
  <rect x="982" y="140" width="26" height="8" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="995" y="147" text-anchor="middle" fill="#fff" font-size="5">step 0.9m</text>
  <!-- Scan ring -->
  <ellipse cx="1050" cy="200" rx="60" ry="14" fill="none" stroke="#F5A623" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <!-- HUD text -->
  <text x="955" y="220" fill="#F5A623" font-size="7" opacity="0.5">3 objects · drag to rotate</text>
  <text x="1140" y="220" text-anchor="end" fill="#F5A623" font-size="7" opacity="0.5">~790 pts</text>

  <!-- Dashboard bottom strip -->
  <rect x="942" y="234" width="216" height="16" rx="3" fill="#0a1520" opacity="0.8"/>
  <text x="1050" y="245" text-anchor="middle" fill="#34D399" font-size="7.5" opacity="0.7">Caregiver Dashboard · wayfr.app/dashboard?session=ABC123</text>

  <!-- Laptop base/hinge -->
  <rect x="920" y="270" width="260" height="10" rx="3" fill="url(#gLaptop)" stroke="#34D399" stroke-width="0.8" opacity="0.7"/>
  <rect x="940" y="280" width="220" height="4" rx="2" fill="#0a1520" opacity="0.7"/>

  <!-- Session ID badge -->
  <rect x="970" y="300" width="160" height="28" rx="6" fill="#0f2820" stroke="#34D399" stroke-width="0.8" opacity="0.8"/>
  <text x="1050" y="312" text-anchor="middle" fill="#34D399" font-size="8" opacity="0.8">session   ABC123</text>
  <text x="1050" y="322" text-anchor="middle" fill="#ffffff" font-size="7.5" opacity="0.4">copy capture link</text>

  <!-- Laptop label -->
  <text x="1050" y="415" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700" letter-spacing="1" opacity="0.9">LAPTOP</text>
  <text x="1050" y="430" text-anchor="middle" fill="#ffffff" font-size="9" opacity="0.4">caregiver · 3D world viewer</text>

  <!-- ─── ARROWS ──────────────────────────────────────────────────────── -->

  <!-- Phone → Backend (WSS) -->
  <line x1="242" y1="245" x2="338" y2="173" stroke="#60A5FA" stroke-width="1.4" stroke-dasharray="6,3" marker-end="url(#ab)" opacity="0.7"/>
  <rect x="256" y="188" width="66" height="14" rx="4" fill="#06060f" opacity="0.9"/>
  <text x="289" y="198" text-anchor="middle" fill="#60A5FA" font-size="8" opacity="0.8">WSS frames</text>

  <!-- Backend → Supabase -->
  <line x1="562" y1="260" x2="658" y2="220" stroke="#A78BFA" stroke-width="1.4" stroke-dasharray="6,3" marker-end="url(#ap)" opacity="0.7"/>
  <rect x="577" y="218" width="64" height="14" rx="4" fill="#06060f" opacity="0.9"/>
  <text x="609" y="228" text-anchor="middle" fill="#A78BFA" font-size="8" opacity="0.8">upsert rows</text>

  <!-- Supabase → Laptop (Realtime push) -->
  <line x1="842" y1="220" x2="928" y2="205" stroke="#34D399" stroke-width="1.4" stroke-dasharray="6,3" marker-end="url(#ag)" opacity="0.7"/>
  <rect x="852" y="200" width="62" height="14" rx="4" fill="#06060f" opacity="0.9"/>
  <text x="883" y="210" text-anchor="middle" fill="#34D399" font-size="8" opacity="0.8">RT push</text>

  <!-- Backend → Laptop (direct narration/audio) -->
  <path d="M 562,330 Q 720,390 928,260" fill="none" stroke="#F5A623" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#am)" opacity="0.45"/>
  <rect x="700" y="370" width="70" height="14" rx="4" fill="#06060f" opacity="0.9"/>
  <text x="735" y="380" text-anchor="middle" fill="#F5A623" font-size="8" opacity="0.7">audio stream</text>

  <!-- Vertical connector arrows inside Backend -->
  <line x1="390" y1="158" x2="390" y2="174" stroke="#F5A623" stroke-width="1" marker-end="url(#am)" opacity="0.5"/>
  <line x1="510" y1="158" x2="510" y2="174" stroke="#F5A623" stroke-width="1" marker-end="url(#am)" opacity="0.5"/>
  <line x1="390" y1="226" x2="390" y2="242" stroke="#F5A623" stroke-width="1" marker-end="url(#am)" opacity="0.5"/>
  <line x1="510" y1="226" x2="510" y2="242" stroke="#F5A623" stroke-width="1" marker-end="url(#am)" opacity="0.5"/>
  <line x1="450" y1="294" x2="450" y2="310" stroke="#F5A623" stroke-width="1" marker-end="url(#am)" opacity="0.5"/>
  <line x1="390" y1="226" x2="460" y2="244" stroke="#F5A623" stroke-width="0.6" opacity="0.25"/>
  <line x1="510" y1="226" x2="460" y2="244" stroke="#F5A623" stroke-width="0.6" opacity="0.25"/>

  <!-- ─── SESSION ID annotation ──────────────────────────────────────── -->
  <rect x="440" y="440" width="320" height="36" rx="8" fill="#1a1205" stroke="#F5A623" stroke-width="0.8" opacity="0.8"/>
  <text x="600" y="455" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="700" letter-spacing="1" opacity="0.9">SESSION ID: ABC123</text>
  <text x="600" y="469" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.4">shared URL param — ties phone capture to laptop dashboard</text>

  <!-- ─── Footer ────────────────────────────────────────────────────── -->
  <text x="600" y="500" text-anchor="middle" fill="#ffffff" font-size="8" opacity="0.2" letter-spacing="2">
    wayfr · cross-device demo architecture · 2026
  </text>
</svg>
